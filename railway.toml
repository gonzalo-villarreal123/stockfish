[build]
builder = "nixpacks"
buildCommand = "cd apps/agents && pip install -r requirements.txt && playwright install chromium"

[deploy]
startCommand = "cd apps/agents && uvicorn api:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
