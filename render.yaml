services:
  - type: web
    name: stockfish-api
    runtime: docker
    dockerfilePath: apps/agents/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: SUPABASE_REST_URL
        value: https://malbjvnmqhdalttcvroi.supabase.co
      # ── Tienda Nube OAuth (STO-14) ─────────────────────────
      # Set these manually in the Render dashboard after creating the TN Partner app.
      # Register redirect URI as: https://stockfish-agents.onrender.com/tn/callback
      - key: TN_APP_ID
        sync: false
      - key: TN_CLIENT_SECRET
        sync: false
      - key: AGENTS_BASE_URL
        value: https://stockfish-agents.onrender.com

# ── Price Sync Cron ─────────────────────────────────────────
# Render cron jobs requieren plan pago. Alternativa gratuita:
# Configurar en cron-job.org:
#   URL:    POST https://stockfish-agents.onrender.com/admin/sync-prices
#   Body:   {"merchant_slug": "all"}
#   Header: Content-Type: application/json
#   Schedule: cada 12 horas (0 */12 * * *)
#
# Qué hace: actualiza price + in_stock en Supabase sin Playwright.
# Tiempo estimado: ~3-5 min para 1000+ productos (15 requests concurrentes).
# ────────────────────────────────────────────────────────────
